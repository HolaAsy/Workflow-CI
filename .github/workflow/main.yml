name: CI MLflow

on:
push:
branches:
- main

pull_request:
branches:
- main

workflow_dispatch:

jobs:

train-model:


runs-on: ubuntu-latest

steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12.7"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install mlflow==2.19.0
      pip install dagshub==0.5.1

  - name: Run MLflow Project
    run: |
      mlflow run MLProject --env-manager=local

  # Ambil RUN_ID terakhir
  - name: Get Latest Run ID
    run: |
      RUN_ID=$(find mlruns -name meta.yaml | head -n 1 | awk -F'/' '{print $(NF-1)}')
      echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
      echo "RUN_ID = $RUN_ID"

  # Upload artifact ke GitHub
  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: mlflow-artifacts
      path: mlruns/

  # Build Docker Image dari model MLflow
  - name: Build Docker Image
    run: |
      mlflow models build-docker \
      --model-uri "runs:/$RUN_ID/model" \
      --name shopping-trends-model

  # Login Docker Hub
  - name: Login Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_HUB_USERNAME }}
      password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

  # Tag Image
  - name: Tag Docker Image
    run: |
      docker tag shopping-trends-model \
      ${{ secrets.DOCKER_HUB_USERNAME }}/shopping-trends-model:latest

  # Push Image
  - name: Push Docker Image
    run: |
      docker push \
      ${{ secrets.DOCKER_HUB_USERNAME }}/shopping-trends-model:latest

